<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频剪辑项目文件夹生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        /* --- CSS 变量 --- */
        :root {
            --bg-color: #f4f4f9;
            --panel-bg: #ffffff;
            --right-panel-bg: #fafafa;
            --text-main: #333333;
            --text-muted: #555555;
            --text-file: #666666;
            --border-color: #eeeeee;
            --input-border: #cccccc;
            --input-bg: #ffffff;
            --hover-bg: #f0f8ff;
            --drag-over-bg: #e6f2ff;
            --accent-color: #007bff;
            --accent-hover: #0056b3;
            --tree-bg: #ffffff;
            --tree-border: #dddddd;
            --instruction-bg: #e9ecef;
            --btn-secondary: #28a745;
            --btn-mac: #333333;
            
            --btn-gradient: linear-gradient(135deg, #007bff 0%, #a066ff 100%);
            --btn-glow: 0 4px 15px rgba(0, 123, 255, 0.3);
            --btn-glow-hover: 0 6px 20px rgba(160, 102, 255, 0.4);
        }

        body.dark-mode {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --right-panel-bg: #181818;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --text-file: #888888;
            --border-color: #333333;
            --input-border: #444444;
            --input-bg: #2d2d2d;
            --hover-bg: #2a2d31;
            --drag-over-bg: #1a2a3a;
            --accent-color: #0a84ff;
            --accent-hover: #0066cc;
            --tree-bg: #252526;
            --tree-border: #333333;
            --instruction-bg: #2a2a2a;
            --btn-secondary: #2ea043;
            --btn-mac: #444444;

            --btn-gradient: linear-gradient(135deg, #3a9ad9 0%, #b07cff 100%);
            --btn-glow: 0 4px 15px rgba(58, 154, 217, 0.3);
            --btn-glow-hover: 0 6px 20px rgba(176, 124, 255, 0.4);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }
        .container { 
            background: var(--panel-bg); 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            display: flex;
            flex-direction: row;
            width: 100%; 
            max-width: 1100px; 
            overflow: hidden;
            height: 88vh;
            border: 1px solid var(--border-color);
        }
        .left-panel {
            padding: 35px;
            flex: 1;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .right-panel {
            padding: 35px;
            flex: 1.2;
            background-color: var(--right-panel-bg);
            overflow-y: auto;
        }
        
        .header-section { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .header-title-group { display: flex; align-items: center; gap: 15px; }
        .header-logo { width: 45px; height: 45px; flex-shrink: 0; border-radius: 10px; object-fit: contain; box-shadow: 0 2px 8px rgba(0,0,0,0.2); background-color: #fff; }
        .header-section h2 { margin: 0; font-size: 20px; color: var(--text-main); }
        
        .theme-toggle-btn { background: var(--instruction-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .theme-toggle-btn:hover { background: var(--hover-bg); }

        h3 { margin-top: 0; color: var(--text-main); }
        
        .instructions { background-color: var(--instruction-bg); padding: 15px; border-radius: 8px; font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .instructions strong { color: var(--text-main); }
        .instructions ul { margin: 5px 0 10px 18px; padding-left: 0; }
        .instructions li { margin-bottom: 4px; }
        
        .template-selector { margin-bottom: 20px; background-color: var(--instruction-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .template-selector label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 13px; color: var(--text-main); }
        .tpl-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .tpl-btn { background: var(--panel-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .tpl-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; color: var(--text-main); font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box; font-family: inherit; background-color: var(--input-bg); color: var(--text-main); transition: 0.3s; }
        input:focus { border-color: var(--accent-color); }
        
        button.primary-btn { 
            background: var(--btn-gradient); color: white; border: none; padding: 14px 24px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; position: relative; overflow: hidden; box-shadow: var(--btn-glow); transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        button.primary-btn:hover { transform: translateY(-2px); box-shadow: var(--btn-glow-hover); }
        button.primary-btn:active { transform: translateY(1px) scale(0.98); box-shadow: var(--btn-glow); transition: all 0.1s ease; }
        button.primary-btn::after {
            content: ''; position: absolute; top: -50%; left: -150%; width: 120%; height: 200%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(30deg); transition: all 1.2s ease-in-out; opacity: 0;
        }
        button.primary-btn:hover::after { left: 150%; opacity: 1; }

        .btn-row { display: flex; gap: 10px; margin-top: auto; padding-top: 20px; }
        button.secondary-btn { background-color: var(--btn-secondary); color: white; border: none; padding: 12px; font-size: 14px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; transition: all 0.2s; }
        button.secondary-btn:hover { filter: brightness(1.1); }
        button.mac-btn { background-color: var(--btn-mac); color: white; border: none; padding: 12px; font-size: 14px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; transition: all 0.2s; }
        button.mac-btn:hover { filter: brightness(1.2); }
        
        .tree-container { background-color: var(--tree-bg); border: 1px solid var(--tree-border); border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; min-height: 50vh; }
        .node { margin-top: 6px; }
        .node-content { 
            display: flex; align-items: center; padding: 2px 6px; 
            cursor: grab; border-radius: 4px; 
            border: 2px solid transparent;
            transition: background-color 0.1s; 
        }
        .node-content:active { cursor: grabbing; }
        .node-content:hover { background-color: var(--hover-bg); }
        .node-content.drag-over-top { border-top-color: var(--accent-color); }
        .node-content.drag-over-bottom { border-bottom-color: var(--accent-color); }
        .node-content.drag-over-inner { background-color: var(--drag-over-bg) !important; border-color: var(--accent-color); border-style: dashed; }

        .node-name { flex-grow: 1; font-weight: 500; pointer-events: none; }
        .is-file .node-name { font-weight: normal; color: var(--text-file); }
        .node-actions { display: none; margin-left: 10px; }
        .node-content:hover .node-actions { display: block; }
        .action-btn { background: none; border: none; color: var(--accent-color); cursor: pointer; font-size: 12px; padding: 0 4px; }
        .action-btn:hover { text-decoration: underline; }
        .action-btn.del { color: #dc3545; }

        .children-container { margin-left: 24px; border-left: 1px dashed var(--input-border); padding-left: 8px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid var(--border-color); }
            .btn-row { flex-direction: column; margin-top: 20px; }
            .header-section { flex-direction: column; align-items: flex-start; }
            .theme-toggle-btn { position: absolute; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div>
            <div class="header-section">
                <div class="header-title-group">
                    <img src="icon.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
                    <h2>视频剪辑文件夹项目生成器 <span style="font-size:12px;color:var(--accent-color);vertical-align:top;">Pro</span></h2>
                </div>
                <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 深色</button>
            </div>
            
            <div class="template-selector">
                <label>📚 场景模板一键切换</label>
                <div class="tpl-btn-group">
                    <button class="tpl-btn" onclick="loadTemplate('full')">标准全流程</button>
                    <button class="tpl-btn" onclick="loadTemplate('light')">轻量快剪版</button>
                    <button class="tpl-btn" onclick="loadTemplate('vfx')">AE特效包装</button>
                    <button class="tpl-btn" onclick="loadTemplate('corporate')">企业宣传片</button>
                </div>
            </div>

            <div class="instructions">
                <strong>📖 快速上手：</strong>
                <ul>
                    <li>第一步：选择<strong>项目日期</strong>，并填写<strong>项目名称</strong>。</li>
                    <li>第二步：点击<strong>蓝色下载按钮</strong>，即可获得项目文件夹。</li>
                </ul>
                <strong>🛠️ 个性化定制：</strong>
                <ul>
                    <li><strong>右侧预览：</strong>鼠标悬浮可进行增删改名；长按拖拽可重新排序。</li>
                    <li><strong>智能保存：</strong>所有修改都会<strong>自动记忆</strong>，下次打开依然有效。</li>
                    <li><strong>文件识别：</strong>命名时带有后缀 (如 .txt) 系统会自动识别为文件。</li>
                </ul>
            </div>

            <div class="input-group">
                <label for="projectDate">项目日期：</label>
                <input type="date" id="projectDate" onchange="renderTree()">
            </div>

            <div class="input-group">
                <label for="projectName">项目名称：</label>
                <input type="text" id="projectName" placeholder="例如: 汽车测评" oninput="renderTree()">
            </div>

            <button class="primary-btn" onclick="generateProject()">一键生成 ZIP 下载</button>
        </div>
        
        <div class="btn-row">
            <button class="secondary-btn" onclick="downloadBatZip()">⬇️ Win 离线版</button>
            <button class="mac-btn" onclick="downloadCommandZip()">⬇️ Mac 离线版</button>
        </div>
    </div>

    <div class="right-panel">
        <h3>实时结构预览 <span style="font-size:12px;font-weight:normal;color:var(--text-muted);">(自动保存 ✅)</span></h3>
        <div class="tree-container" id="treeWindow"></div>
    </div>
</div>

<script>
    // --- 核心库：四大场景模板配置 ---
    const templates = {
        full: [
            { id: 1, name: "1_工程文件", type: "folder", children: [
                { id: 2, name: "1_PR工程", type: "folder", children: [] },
                { id: 3, name: "2_AE工程", type: "folder", children: [] },
                { id: 4, name: "3_剪映工程", type: "folder", children: [] },
                { id: 5, name: "4_达芬奇工程", type: "folder", children: [] },
                { id: 6, name: "#{DATE}_{NAME}_版本_分辨率.txt", type: "file", children: [] }
            ]},
            { id: 7, name: "2_原始素材", type: "folder", children: [
                { id: 8, name: "1_视频_原片", type: "folder", children: [] },
                { id: 9, name: "2_图片", type: "folder", children: [] },
                { id: 10, name: "3_旁白", type: "folder", children: [] },
                { id: 11, name: "4_音效音乐", type: "folder", children: [] },
                { id: 12, name: "5_字幕", type: "folder", children: [] },
                { id: 13, name: "6_AE制作导出", type: "folder", children: [] },
                { id: 14, name: "7_资料画面", type: "folder", children: [] }
            ]},
            { id: 15, name: "3_审稿流程", type: "folder", children: [
                { id: 16, name: "1_ACopy初剪", type: "folder", children: [{ id: 17, name: "# 粗剪、草稿版.txt", type: "file", children: [] }] },
                { id: 18, name: "2_BCopy精剪", type: "folder", children: [{ id: 19, name: "# 给客户预览（带水印）.txt", type: "file", children: [] }] },
                { id: 20, name: "3_CCopy定稿", type: "folder", children: [{ id: 21, name: "# 可直接上传.txt", type: "file", children: [] }] }
            ]},
            { id: 22, name: "4_交付文件", type: "folder", children: [
                { id: 23, name: "1_成片", type: "folder", children: [{ id: 24, name: "#{DATE}_{NAME}_版本_分辨率.txt", type: "file", children: [] }] },
                { id: 25, name: "2_封面图", type: "folder", children: [] },
                { id: 26, name: "3_发布文案", type: "folder", children: [] }
            ]},
            { id: 27, name: "5_成片归档_{DATE}_{NAME}", type: "folder", children: [] }
        ],
        corporate: [
            { id: 301, name: "1_项目管理与策划", type: "folder", children: [
                { id: 302, name: "1_脚本分镜", type: "folder", children: [] },
                { id: 303, name: "2_客户需求单", type: "folder", children: [] }
            ]},
            { id: 304, name: "2_素材库", type: "folder", children: [
                { id: 305, name: "1_A-Roll_采访素材", type: "folder", children: [] },
                { id: 306, name: "2_B-Roll_空镜素材", type: "folder", children: [] },
                { id: 307, name: "3_企业VI包装", type: "folder", children: [] },
                { id: 308, name: "4_版权音乐", type: "folder", children: [] }
            ]},
            { id: 313, name: "3_剪辑工程", type: "folder", children: [
                { id: 310, name: "1_PR工程", type: "folder", children: [] },
                { id: 311, name: "2_AE包装", type: "folder", children: [] },
                { id: 312, name: "3_达芬奇调色", type: "folder", children: [] }
            ]},
            { id: 314, name: "4_审片输出", type: "folder", children: [
                { id: 315, name: "1_内部审片", type: "folder", children: [] },
                { id: 316, name: "2_带水印_发客户", type: "folder", children: [] },
                { id: 317, name: "3_最终交付版", type: "folder", children: [] }
            ]}
        ],
        light: [
            { id: 101, name: "1_剪辑工程", type: "folder", children: [
                { id: 102, name: "1_剪映工程", type: "folder", children: [] },
                { id: 103, name: "2_PR工程", type: "folder", children: [] }
            ]},
            { id: 104, name: "2_素材库", type: "folder", children: [
                { id: 105, name: "1_视频拍摄", type: "folder", children: [] },
                { id: 106, name: "2_网图资料", type: "folder", children: [] },
                { id: 107, name: "3_音乐音效", type: "folder", children: [] }
            ]},
            { id: 108, name: "3_输出成片", type: "folder", children: [
                { id: 109, name: "1_预览修改", type: "folder", children: [] },
                { id: 110, name: "2_最终定稿", type: "folder", children: [] }
            ]}
        ],
        vfx: [
            { id: 201, name: "1_AE合成工程", type: "folder", children: [
                { id: 202, name: "#{DATE}_{NAME}_Comp.aep", type: "file", children: [] }
            ]},
            { id: 203, name: "2_三维工程_C4D", type: "folder", children: [] },
            { id: 204, name: "3_资产库_Assets", type: "folder", children: [
                { id: 205, name: "1_3D模型", type: "folder", children: [] },
                { id: 206, name: "2_贴图材质", type: "folder", children: [] },
                { id: 207, name: "3_参考图集", type: "folder", children: [] }
            ]},
            { id: 208, name: "4_素材输入_Footage", type: "folder", children: [
                { id: 209, name: "1_实拍绿幕", type: "folder", children: [] },
                { id: 210, name: "2_图片序列", type: "folder", children: [] }
            ]},
            { id: 211, name: "5_渲染输出_Renders", type: "folder", children: [
                { id: 212, name: "1_单帧测试", type: "folder", children: [] },
                { id: 213, name: "2_带通道序列", type: "folder", children: [] },
                { id: 214, name: "3_最终成片", type: "folder", children: [] }
            ]}
        ]
    };

    let templateData = [];
    let nextId = 500; 
    let draggedNodeId = null;
    let currentDropPosition = ''; 
    
    function saveState() { localStorage.setItem('videoProjectGeneratorState', JSON.stringify(templateData)); }
    function loadState() {
        let saved = localStorage.getItem('videoProjectGeneratorState');
        if (saved) templateData = JSON.parse(saved);
        else templateData = JSON.parse(JSON.stringify(templates.full)); 
        renderTree();
    }
    function loadTemplate(type) {
        let nameMap = { 'full': '标准全流程', 'corporate': '企业宣传片', 'light': '轻量快剪版', 'vfx': 'AE特效包装版' };
        if(confirm(`切换为【${nameMap[type]}】将会覆盖你当前的自定义修改。是否继续？`)) {
            templateData = JSON.parse(JSON.stringify(templates[type]));
            renderTree(); saveState();
        }
    }
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) { btn.innerHTML = '☀️ 浅色'; localStorage.setItem('theme', 'dark'); }
        else { btn.innerHTML = '🌙 深色'; localStorage.setItem('theme', 'light'); }
    }
    function initTheme() {
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeBtn').innerHTML = '☀️ 浅色'; }
    }

    function handleDragStart(e, id) { draggedNodeId = id; e.dataTransfer.effectAllowed = "move"; setTimeout(() => e.target.style.opacity = "0.5", 0); }
    function handleDragEnd(e) { e.target.style.opacity = "1"; currentDropPosition = ''; }
    function handleDragOver(e, id) {
        e.preventDefault(); e.stopPropagation();
        let targetEl = e.currentTarget;
        let rect = targetEl.getBoundingClientRect();
        let y = e.clientY - rect.top; 
        targetEl.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-inner');
        if (id === 'root') { currentDropPosition = 'inner'; targetEl.classList.add('drag-over-inner'); return; }
        let targetInfo = findNodeAndParent(templateData, id);
        let isFolder = targetInfo && targetInfo.node.type === 'folder';
        if (y < rect.height * 0.25) { currentDropPosition = 'top'; targetEl.classList.add('drag-over-top'); }
        else if (y > rect.height * 0.75) { currentDropPosition = 'bottom'; targetEl.classList.add('drag-over-bottom'); }
        else {
            if (isFolder) { currentDropPosition = 'inner'; targetEl.classList.add('drag-over-inner'); }
            else { currentDropPosition = 'bottom'; targetEl.classList.add('drag-over-bottom'); }
        }
    }
    function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-inner'); }

    function isDescendant(draggedNode, targetId) {
        if (!draggedNode.children) return false;
        for (let child of draggedNode.children) { if (child.id === targetId) return true; if (isDescendant(child, targetId)) return true; }
        return false;
    }

    function handleDrop(e, targetId) {
        e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom', 'drag-over-inner');
        if (!draggedNodeId || draggedNodeId === targetId) return;
        let draggedInfo = findNodeAndParent(templateData, draggedNodeId);
        let targetInfo = targetId === 'root' ? { node: { type: 'folder', children: templateData }, parentArray: null } : findNodeAndParent(templateData, targetId);
        if (draggedInfo && targetInfo) {
            if (isDescendant(draggedInfo.node, targetId)) { alert("⛔ 操作被拦截：你不能把一个文件夹塞进它自己的子文件夹里哦！"); return; }
            let sArr = draggedInfo.parentArray;
            let sIndex = sArr.findIndex(n => n.id === draggedNodeId);
            let nodeToMove = sArr.splice(sIndex, 1)[0];
            if (targetId === 'root') { templateData.push(nodeToMove); autoRenumber(templateData); }
            else {
                let tArr = targetInfo.parentArray;
                let tIndex = tArr.findIndex(n => n.id === targetId);
                if (currentDropPosition === 'top') { tArr.splice(tIndex, 0, nodeToMove); autoRenumber(tArr); }
                else if (currentDropPosition === 'bottom') { tArr.splice(tIndex + 1, 0, nodeToMove); autoRenumber(tArr); }
                else if (currentDropPosition === 'inner') { targetInfo.node.children.push(nodeToMove); autoRenumber(targetInfo.node.children); }
            }
            autoRenumber(sArr); renderTree(); saveState(); 
        }
        draggedNodeId = null; currentDropPosition = '';
    }

    function autoRenumber(nodesArray) {
        let counter = 1;
        nodesArray.forEach(node => { if (/^\d+_/.test(node.name)) { node.name = node.name.replace(/^\d+_/, counter + '_'); counter++; } });
    }

    function getTodayForInput() {
        let today = new Date();
        return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    }
    function getSelectedDateString() {
        let dateInput = document.getElementById('projectDate').value;
        return (dateInput || getTodayForInput()).replace(/-/g, '');
    }
    function getProjectName() {
        let name = document.getElementById('projectName').value.trim();
        return name === "" ? "未命名项目" : name;
    }
    function parseVars(str) {
        return str.replace(/\{DATE\}/g, getSelectedDateString()).replace(/\{NAME\}/g, getProjectName());
    }
    function findNodeAndParent(nodes, id) {
        for (let i = 0; i < nodes.length; i++) {
            if (nodes[i].id === id) return { node: nodes[i], parentArray: nodes };
            if (nodes[i].children) { let result = findNodeAndParent(nodes[i].children, id); if (result) return result; }
        }
        return null;
    }
    function getNextId() { return ++nextId; }
    function addNode(parentId) {
        let newName = prompt("请输入新名称:\n(提示: 包含扩展名如 .txt 识别为文件，以数字下划线开头如 '1_' 可参与自动排序)");
        if (!newName || newName.trim() === "") return;
        let type = newName.includes('.') ? "file" : "folder";
        let newNode = { id: getNextId(), name: newName.trim(), type: type, children: [] };
        if (parentId === 'root') { templateData.push(newNode); autoRenumber(templateData); }
        else { let target = findNodeAndParent(templateData, parentId); if (target && target.node.type === "folder") { target.node.children.push(newNode); autoRenumber(target.node.children); } }
        renderTree(); saveState();
    }
    function renameNode(id) {
        let target = findNodeAndParent(templateData, id);
        if (target) {
            let newName = prompt("请输入新的名称:", target.node.name);
            if (newName && newName.trim() !== "") { target.node.name = newName.trim(); target.node.type = newName.includes('.') ? "file" : "folder"; autoRenumber(target.parentArray); renderTree(); saveState(); }
        }
    }
    function deleteNode(id) {
        let target = findNodeAndParent(templateData, id);
        if (target && confirm(`确定要删除 [${parseVars(target.node.name)}] 吗？`)) { let index = target.parentArray.findIndex(n => n.id === id); if (index > -1) { target.parentArray.splice(index, 1); autoRenumber(target.parentArray); } renderTree(); saveState(); }
    }

    function createNodeHTML(node) {
        let actualName = parseVars(node.name);
        let icon = node.type === 'folder' ? '📁' : '📄';
        return `
            <div class="node ${node.type === 'file' ? 'is-file' : ''}">
                <div class="node-content" draggable="true" ondragstart="handleDragStart(event, ${node.id})" ondragend="handleDragEnd(event)" ondragover="handleDragOver(event, ${node.id})" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${node.id})">
                    <span class="node-name">${icon} ${actualName}</span>
                    <div class="node-actions">
                        ${node.type === 'folder' ? `<button class="action-btn" onclick="addNode(${node.id})">[+加子项]</button>` : ''}
                        <button class="action-btn" onclick="renameNode(${node.id})">[改名]</button>
                        <button class="action-btn del" onclick="deleteNode(${node.id})">[删]</button>
                    </div>
                </div>
                ${(node.children && node.children.length > 0) ? `<div class="children-container">${node.children.map(child => createNodeHTML(child)).join('')}</div>` : ''}
            </div>`;
    }

    function renderTree() {
        let container = document.getElementById('treeWindow');
        container.innerHTML = `
            <div class="node">
                <div class="node-content" ondragover="handleDragOver(event, 'root')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'root')">
                    <span class="node-name" style="font-weight:bold; color:var(--accent-color);">📦 ${getSelectedDateString()}_${getProjectName()} (根目录)</span>
                    <div class="node-actions"><button class="action-btn" onclick="addNode('root')">[+新建一级目录]</button></div>
                </div>
                <div class="children-container" style="border-left: 2px solid var(--accent-color);">${templateData.map(node => createNodeHTML(node)).join('')}</div>
            </div>`;
    }

    function buildZipRecursively(zipFolder, nodes) {
        nodes.forEach(node => {
            let actualName = parseVars(node.name);
            if (node.type === 'folder') { let newFolder = zipFolder.folder(actualName); if (node.children && node.children.length > 0) buildZipRecursively(newFolder, node.children); }
            else { zipFolder.file(actualName, ""); }
        });
    }

    function generateProject() {
        if (typeof JSZip === 'undefined') { alert("ZIP 组件加载失败！"); return; }
        let rootFolderName = `${getSelectedDateString()}_${getProjectName()}`;
        let zip = new JSZip(); buildZipRecursively(zip.folder(rootFolderName), templateData);
        setTimeout(() => { zip.generateAsync({type:"blob"}).then(content => { let link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = rootFolderName + ".zip"; link.click(); }); }, 200);
    }

    function generateBatScript() {
        let lines = ["@echo off", "chcp 65001 >nul", "set /p ProjectName=\"请输入项目名称: \"", "if \"%ProjectName%\"==\"\" set ProjectName=未命名项目", "for /f %%i in ('powershell -command \"Get-Date -Format yyyyMMdd\"') do set DATE_STR=%%i", "set \"ROOT_DIR=%USERPROFILE%\\Desktop\\%DATE_STR%_%ProjectName%\"", "mkdir \"%ROOT_DIR%\" 2>nul"];
        function traverse(nodes, currentPath) { nodes.forEach(node => { let safeName = node.name.replace(/\{DATE\}/g, "%DATE_STR%").replace(/\{NAME\}/g, "%ProjectName%"); let newPath = currentPath + "\\\\" + safeName; if (node.type === 'folder') { lines.push(`mkdir "${newPath}"`); if (node.children) traverse(node.children, newPath); } else { lines.push(`type nul > "${newPath}"`); } }); }
        traverse(templateData, "%ROOT_DIR%"); lines.push("start \"\" \"%ROOT_DIR%\""); return lines;
    }
    function downloadBatZip() {
        let zip = new JSZip(); zip.file("新建剪辑项目_Win离线版.bat", generateBatScript().join('\r\n')); zip.file("Windows电脑如何运行.txt", "1.右键属性勾选[解除锁定]\r\n2.双击即可生成。");
        zip.generateAsync({type:"blob"}).then(content => { let link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = "Win离线版生成器.zip"; link.click(); });
    }
    function generateMacScript() {
        let lines = ["#!/bin/bash", "echo \"请输入项目名称:\"", "read ProjectName", "if [ -z \"$ProjectName\" ]; then ProjectName=\"未命名项目\"; fi", "DATE_STR=$(date +%Y%m%d)", "ROOT_DIR=\"$HOME/Desktop/${DATE_STR}_${ProjectName}\""];
        function traverse(nodes, currentPath) { nodes.forEach(node => { let safeName = node.name.replace(/\{DATE\}/g, "${DATE_STR}").replace(/\{NAME\}/g, "${ProjectName}"); let newPath = currentPath + "/" + safeName; if (node.type === 'folder') { lines.push(`mkdir -p "${newPath}"`); if (node.children) traverse(node.children, newPath); } else { lines.push(`touch "${newPath}"`); } }); }
        traverse(templateData, "$ROOT_DIR"); lines.push("", "open \"$ROOT_DIR\""); return lines;
    }
    function downloadCommandZip() {
        let zip = new JSZip(); zip.file("新建剪辑项目_Mac离线版.command", generateMacScript().join('\n')); zip.file("Mac电脑如何运行.txt", "首次运行需在终端输入 chmod +x 并拖入文件回车。");
        zip.generateAsync({type:"blob"}).then(content => { let link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = "Mac离线版生成器.zip"; link.click(); });
    }

    document.addEventListener('DOMContentLoaded', () => { initTheme(); document.getElementById('projectDate').value = getTodayForInput(); loadState(); });
</script>

</body>
