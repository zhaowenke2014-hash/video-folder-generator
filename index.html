<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频剪辑项目文件夹生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container { 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            display: flex;
            flex-direction: row;
            width: 100%; 
            max-width: 1050px; 
            overflow: hidden;
            height: 85vh;
        }
        .left-panel {
            padding: 40px;
            flex: 1;
            border-right: 1px solid #eee;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .right-panel {
            padding: 40px;
            flex: 1.2;
            background-color: #fafafa;
            overflow-y: auto;
        }
        
        /* 标题与图标布局 */
        .header-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-logo {
            width: 50px;
            height: 50px;
            flex-shrink: 0; 
            border-radius: 12px; 
            object-fit: contain; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        .header-section h2 { 
            margin: 0; 
            color: #333; 
            font-size: 24px;
        }
        
        h3 { margin-top: 0; color: #333; }
        .instructions {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .instructions ul { margin: 8px 0 0; padding-left: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        input { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 15px; outline: none; box-sizing: border-box; font-family: inherit;
        }
        input:focus { border-color: #007bff; }
        
        /* 按钮样式 */
        button.primary-btn { 
            background-color: #007bff; color: white; border: none; padding: 14px 24px; 
            font-size: 16px; border-radius: 6px; cursor: pointer; transition: background 0.3s; 
            width: 100%; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,123,255,0.2);
        }
        button.primary-btn:hover { background-color: #0056b3; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: auto; 
            padding-top: 30px; 
        }

        button.secondary-btn { 
            background-color: #28a745; color: white; border: none; padding: 12px; 
            font-size: 14px; border-radius: 6px; cursor: pointer; transition: background 0.3s; 
            flex: 1; font-weight: bold; box-shadow: 0 4px 6px rgba(40,167,69,0.2);
        }
        button.secondary-btn:hover { background-color: #218838; }

        button.mac-btn { 
            background-color: #333; color: white; border: none; padding: 12px; 
            font-size: 14px; border-radius: 6px; cursor: pointer; transition: background 0.3s; 
            flex: 1; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button.mac-btn:hover { background-color: #111; }
        
        /* 动态树状图样式 */
        .tree-container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
        }
        .node { margin-top: 6px; }
        .node-content { 
            display: flex; align-items: center; padding: 4px 0; 
            cursor: grab; /* 增加抓取手势提示 */
            transition: all 0.2s;
        }
        .node-content:active { cursor: grabbing; }
        .node-content:hover { background-color: #f0f8ff; border-radius: 4px; }
        
        /* 拖拽悬浮时的指示线 */
        .node-content.drag-over {
            border-top: 2px solid #007bff;
            background-color: #e6f2ff;
        }

        .node-name { flex-grow: 1; font-weight: 500; color: #333; pointer-events: none; }
        .is-file .node-name { font-weight: normal; color: #666; }
        .node-actions { display: none; margin-left: 10px; }
        .node-content:hover .node-actions { display: block; }
        .action-btn { 
            background: none; border: none; color: #007bff; cursor: pointer; 
            font-size: 12px; padding: 0 4px; font-family: inherit;
        }
        .action-btn:hover { color: #0056b3; text-decoration: underline; }
        .action-btn.del { color: #dc3545; }
        .action-btn.del:hover { color: #a71d2a; }
        .children-container { margin-left: 24px; border-left: 1px dashed #ccc; padding-left: 8px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid #eee; }
            .btn-row { flex-direction: column; margin-top: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div>
            <div class="header-section">
                <img src="icon.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
                <h2>视频剪辑项目文件夹生成器</h2>
            </div>
            
            <div class="instructions">
                <strong>💡 使用与自定义说明：</strong>
                <ul>
                    <li>修改日期和名称，右侧预览会自动更新。</li>
                    <li><strong>按住并拖拽</strong>任何文件夹可以进行排序，前面的序号会自动重排。</li>
                    <li>悬浮在文件夹上可使用 <code>[+加子项]</code> <code>[改名]</code> <code>[删]</code>。带有后缀名(如 .txt)将自动识别为文件。</li>
                </ul>
            </div>

            <div class="input-group">
                <label for="projectDate">项目日期：</label>
                <input type="date" id="projectDate" onchange="renderTree()">
            </div>

            <div class="input-group">
                <label for="projectName">项目名称：</label>
                <input type="text" id="projectName" placeholder="例如: 汽车测评" oninput="renderTree()">
            </div>

            <button class="primary-btn" onclick="generateProject()">🚀 一键生成 ZIP 下载</button>
        </div>
        
        <div class="btn-row">
            <button class="secondary-btn" onclick="downloadBatZip()">⬇️ Win 离线版 (.zip)</button>
            <button class="mac-btn" onclick="downloadCommandZip()">⬇️ Mac 离线版 (.zip)</button>
        </div>
    </div>

    <div class="right-panel">
        <h3>实时结构预览 (可自由拖拽编辑)</h3>
        <div class="tree-container" id="treeWindow"></div>
    </div>
</div>

<script>
    // --- 数据模型 ---
    let nextId = 100;
    let templateData = [
        { id: 1, name: "1_工程文件", type: "folder", children: [
            { id: 2, name: "1_PR工程", type: "folder", children: [] },
            { id: 3, name: "2_AE工程", type: "folder", children: [] },
            { id: 4, name: "3_剪映工程", type: "folder", children: [] },
            { id: 5, name: "4_达芬奇工程", type: "folder", children: [] },
            { id: 6, name: "#{DATE}_{NAME}_版本_分辨率.txt", type: "file", children: [] }
        ]},
        { id: 7, name: "2_原始素材", type: "folder", children: [
            { id: 8, name: "1_视频_原片", type: "folder", children: [] },
            { id: 9, name: "2_图片", type: "folder", children: [] },
            { id: 10, name: "3_旁白", type: "folder", children: [] },
            { id: 11, name: "4_音效音乐", type: "folder", children: [] },
            { id: 12, name: "5_字幕", type: "folder", children: [] },
            { id: 13, name: "6_AE制作导出", type: "folder", children: [] },
            { id: 14, name: "7_资料画面", type: "folder", children: [] }
        ]},
        { id: 15, name: "3_审稿流程", type: "folder", children: [
            { id: 16, name: "1_ACopy初剪", type: "folder", children: [
                { id: 17, name: "# 粗剪、草稿版.txt", type: "file", children: [] }
            ]},
            { id: 18, name: "2_BCopy精剪", type: "folder", children: [
                { id: 19, name: "# 给客户看的预览（带水印）.txt", type: "file", children: [] }
            ]},
            { id: 20, name: "3_CCopy定稿", type: "folder", children: [
                { id: 21, name: "# 可直接上传.txt", type: "file", children: [] }
            ]}
        ]},
        { id: 22, name: "4_交付文件", type: "folder", children: [
            { id: 23, name: "1_成片", type: "folder", children: [
                { id: 24, name: "#{DATE}_{NAME}_版本_分辨率.txt", type: "file", children: [] }
            ]},
            { id: 25, name: "2_封面图", type: "folder", children: [] },
            { id: 26, name: "3_发布文案", type: "folder", children: [] }
        ]},
        { id: 27, name: "5_成片归档_{DATE}_{NAME}", type: "folder", children: [] }
    ];

    // --- 拖拽功能逻辑 ---
    let draggedNodeId = null;

    function handleDragStart(e, id) {
        draggedNodeId = id;
        e.dataTransfer.effectAllowed = "move";
        // 降低拖拽源的透明度，提升视觉体验
        setTimeout(() => e.target.style.opacity = "0.5", 0); 
    }

    function handleDragEnd(e) {
        e.target.style.opacity = "1";
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(e, targetId) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        
        if (!draggedNodeId || draggedNodeId === targetId) return;

        let draggedInfo = findNodeAndParent(templateData, draggedNodeId);
        let targetInfo = targetId === 'root' ? { parentArray: templateData } : findNodeAndParent(templateData, targetId);

        if (draggedInfo && targetInfo) {
            let sArr = draggedInfo.parentArray;
            let tArr = targetInfo.parentArray;

            // 把被拖拽的节点从原数组中切出来
            let sIndex = sArr.findIndex(n => n.id === draggedNodeId);
            let nodeToMove = sArr.splice(sIndex, 1)[0];

            // 插入到目标位置的前面（如果是根节点就放到最后）
            if (targetId === 'root') {
                tArr.push(nodeToMove);
            } else {
                let tIndex = tArr.findIndex(n => n.id === targetId);
                tArr.splice(tIndex, 0, nodeToMove);
            }

            // 执行自动重排编号功能
            autoRenumber(sArr);
            if (sArr !== tArr) autoRenumber(tArr);

            renderTree();
        }
        draggedNodeId = null;
    }

    // --- 自动重新编号引擎 ---
    function autoRenumber(nodesArray) {
        let counter = 1;
        nodesArray.forEach(node => {
            // 正则匹配：检查开头是不是 "任意数字_XXX" 的格式
            if (/^\d+_/.test(node.name)) {
                // 将开头的数字替换为顺延的正确数字
                node.name = node.name.replace(/^\d+_/, counter + '_');
                counter++;
            }
        });
    }

    // --- 基础工具函数 ---
    function getTodayForInput() {
        let today = new Date();
        let yyyy = today.getFullYear();
        let mm = String(today.getMonth() + 1).padStart(2, '0');
        let dd = String(today.getDate()).padStart(2, '0');
        return yyyy + '-' + mm + '-' + dd;
    }

    function getSelectedDateString() {
        let dateInput = document.getElementById('projectDate').value;
        if (!dateInput) return getTodayForInput().replace(/-/g, '');
        return dateInput.replace(/-/g, '');
    }

    function getProjectName() {
        let name = document.getElementById('projectName').value.trim();
        return name === "" ? "未命名项目" : name;
    }

    function parseVars(str) {
        let dateStr = getSelectedDateString();
        let nameStr = getProjectName();
        return str.replace(/\{DATE\}/g, dateStr).replace(/\{NAME\}/g, nameStr);
    }

    function findNodeAndParent(nodes, id, parent = null) {
        for (let i = 0; i < nodes.length; i++) {
            if (nodes[i].id === id) return { node: nodes[i], parentArray: nodes };
            if (nodes[i].children) {
                let result = findNodeAndParent(nodes[i].children, id, nodes[i]);
                if (result) return result;
            }
        }
        return null;
    }

    // --- 节点操作 ---
    function addNode(parentId) {
        let newName = prompt("请输入新名称:\n(提示: 包含扩展名如 .txt 识别为文件，以 '1_' 格式开头可参与自动排序)");
        if (!newName || newName.trim() === "") return;
        
        let type = newName.includes('.') ? "file" : "folder";
        let newNode = { id: nextId++, name: newName.trim(), type: type, children: [] };

        if (parentId === 'root') {
            templateData.push(newNode);
            autoRenumber(templateData);
        } else {
            let target = findNodeAndParent(templateData, parentId);
            if (target && target.node.type === "folder") {
                target.node.children.push(newNode);
                autoRenumber(target.node.children);
            }
        }
        renderTree();
    }

    function renameNode(id) {
        let target = findNodeAndParent(templateData, id);
        if (target) {
            let newName = prompt("请输入新的名称:", target.node.name);
            if (newName && newName.trim() !== "") {
                target.node.name = newName.trim();
                target.node.type = newName.includes('.') ? "file" : "folder"; 
                // 改名后也顺便触发一次重排，防止用户手动输入了乱序的数字
                autoRenumber(target.parentArray);
                renderTree();
            }
        }
    }

    function deleteNode(id) {
        let target = findNodeAndParent(templateData, id);
        if (target) {
            if(confirm(`确定要删除 [${parseVars(target.node.name)}] 吗？`)) {
                let index = target.parentArray.findIndex(n => n.id === id);
                if (index > -1) {
                    target.parentArray.splice(index, 1);
                    autoRenumber(target.parentArray);
                }
                renderTree();
            }
        }
    }

    // --- 渲染 UI ---
    function createNodeHTML(node) {
        let actualName = parseVars(node.name);
        let icon = node.type === 'folder' ? '📁' : '📄';
        let isFileClass = node.type === 'file' ? 'is-file' : '';
        
        // 为每个节点添加 HTML5 拖拽属性和事件
        let html = `
            <div class="node ${isFileClass}">
                <div class="node-content" 
                     draggable="true" 
                     ondragstart="handleDragStart(event, ${node.id})" 
                     ondragend="handleDragEnd(event)"
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)" 
                     ondrop="handleDrop(event, ${node.id})">
                    <span class="node-name">${icon} ${actualName}</span>
                    <div class="node-actions">
                        ${node.type === 'folder' ? `<button class="action-btn" onclick="addNode(${node.id})">[+加子项]</button>` : ''}
                        <button class="action-btn" onclick="renameNode(${node.id})">[改名]</button>
                        <button class="action-btn del" onclick="deleteNode(${node.id})">[删]</button>
                    </div>
                </div>
        `;
        
        if (node.children && node.children.length > 0) {
            html += `<div class="children-container">`;
            node.children.forEach(child => {
                html += createNodeHTML(child);
            });
            html += `</div>`;
        }
        
        html += `</div>`;
        return html;
    }

    function renderTree() {
        let rootName = `${getSelectedDateString()}_${getProjectName()}`;
        let container = document.getElementById('treeWindow');
        
        // 根目录也可以作为拖拽放置的目标
        let html = `
            <div class="node">
                <div class="node-content"
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)" 
                     ondrop="handleDrop(event, 'root')">
                    <span class="node-name" style="font-weight:bold; color:#0056b3;">📦 ${rootName} (根目录)</span>
                    <div class="node-actions">
                        <button class="action-btn" onclick="addNode('root')">[+新建一级目录]</button>
                    </div>
                </div>
                <div class="children-container" style="border-left: 2px solid #007bff;">
        `;
        
        templateData.forEach(node => {
            html += createNodeHTML(node);
        });
        
        html += `</div></div>`;
        container.innerHTML = html;
    }

    // --- 核心：一键生成项目结构 ZIP ---
    function buildZipRecursively(zipFolder, nodes) {
        nodes.forEach(node => {
            let actualName = parseVars(node.name);
            if (node.type === 'folder') {
                let newFolder = zipFolder.folder(actualName);
                if (node.children && node.children.length > 0) {
                    buildZipRecursively(newFolder, node.children);
                }
            } else {
                zipFolder.file(actualName, ""); 
            }
        });
    }

    function generateProject() {
        if (typeof JSZip === 'undefined') {
            alert("ZIP 组件加载失败，请检查网络！");
            return;
        }

        let rootFolderName = `${getSelectedDateString()}_${getProjectName()}`;
        let zip = new JSZip();
        let root = zip.folder(rootFolderName);
        
        buildZipRecursively(root, templateData);

        zip.generateAsync({type:"blob"}).then(function(content) {
            let link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = rootFolderName + ".zip";
            link.click();
            URL.revokeObjectURL(link.href);
        }).catch(function(err) {
            alert("生成 ZIP 失败：" + err);
        });
    }

    // --- Win 离线版 ZIP (包含 BAT 和 说明文档) ---
    function downloadBatZip() {
        if (typeof JSZip === 'undefined') {
            alert("ZIP 组件加载失败，请检查网络！");
            return;
        }

        const batLines = [
            "@echo off",
            "chcp 65001 >nul",
            "set /p ProjectName=\"请输入项目名称 (例如: 汽车测评): \"",
            "if \"%ProjectName%\"==\"\" set ProjectName=未命名项目",
            "",
            ":: 获取当前日期 YYYYMMDD",
            "for /f %%i in ('powershell -command \"Get-Date -Format yyyyMMdd\"') do set DATE_STR=%%i",
            "",
            "set \"ROOT_DIR=%USERPROFILE%\\Desktop\\%DATE_STR%_%ProjectName%\"",
            "",
            "mkdir \"%ROOT_DIR%\" 2>nul",
            "mkdir \"%ROOT_DIR%\\1_工程文件\\1_PR工程\"",
            "mkdir \"%ROOT_DIR%\\1_工程文件\\2_AE工程\"",
            "mkdir \"%ROOT_DIR%\\1_工程文件\\3_剪映工程\"",
            "mkdir \"%ROOT_DIR%\\1_工程文件\\4_达芬奇工程\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\1_视频_原片\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\2_图片\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\3_旁白\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\4_音效音乐\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\5_字幕\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\6_AE制作导出\"",
            "mkdir \"%ROOT_DIR%\\2_原始素材\\7_资料画面\"",
            "mkdir \"%ROOT_DIR%\\3_审稿流程\\1_ACopy初剪\"",
            "mkdir \"%ROOT_DIR%\\3_审稿流程\\2_BCopy精剪\"",
            "mkdir \"%ROOT_DIR%\\3_审稿流程\\3_CCopy定稿\"",
            "mkdir \"%ROOT_DIR%\\4_交付文件\\1_成片\"",
            "mkdir \"%ROOT_DIR%\\4_交付文件\\2_封面图\"",
            "mkdir \"%ROOT_DIR%\\4_交付文件\\3_发布文案\"",
            "mkdir \"%ROOT_DIR%\\5_成片归档_%DATE_STR%_%ProjectName%\"",
            "",
            "type nul > \"%ROOT_DIR%\\1_工程文件\\#%DATE_STR%_%ProjectName%_版本_分辨率.txt\"",
            "type nul > \"%ROOT_DIR%\\4_交付文件\\1_成片\\#%DATE_STR%_%ProjectName%_版本_分辨率.txt\"",
            "type nul > \"%ROOT_DIR%\\3_审稿流程\\1_ACopy初剪\\# 粗剪、草稿版.txt\"",
            "type nul > \"%ROOT_DIR%\\3_审稿流程\\2_BCopy精剪\\# 给客户看的预览（带水印）.txt\"",
            "type nul > \"%ROOT_DIR%\\3_审稿流程\\3_CCopy定稿\\# 可直接上传.txt\"",
            "",
            "start \"\" \"%ROOT_DIR%\""
        ];

        const winReadmeLines = [
            "因为这个 .bat 脚本是从浏览器下载的，Windows 为了保护电脑安全，可能会自动拦截。",
            "如果双击无法运行或提示安全拦截，请使用以下两种方法之一解除限制：",
            "",
            "【方法一：一键解除锁定】（推荐）",
            "1. 右键点击下载的 .bat 文件，选择“属性”。",
            "2. 在“常规”选项卡的最下方，找到安全提示：“此文件来自其他计算机...”。",
            "3. 勾选旁边的“解除锁定”框。",
            "4. 点击“确定”，即可正常双击运行。",
            "",
            "【方法二：本地新建法】",
            "1. 右键点击下载的 .bat 文件，选择“编辑”（或用记事本打开）。",
            "2. 复制里面的所有代码。",
            "3. 在你的电脑桌面上新建一个普通的文本文档 (.txt)。",
            "4. 把刚才复制的代码粘贴进去并保存。",
            "5. 将这个新文档的后缀名从 .txt 改为 .bat，即可完美运行。"
        ];

        let zip = new JSZip();
        zip.file("新建剪辑项目_Win离线版.bat", batLines.join('\r\n'));
